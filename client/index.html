<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body { margin: 0; padding: 0; background: #111827; }
      #root { min-height: 100vh; }
      /* show something immediately before React loads */
      #boot {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        color: rgba(255,255,255,0.85);
        text-align: center;
        padding: 24px;
      }
      #boot .title { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
      #boot .sub { font-size: 14px; opacity: 0.8; }
      /* if user is in light theme, still avoid pure white flash */
      .light body { background: #f5f5f7; }
    </style><!-- Apply theme class immediately to prevent flash of light mode before dark mode loads -->
    <script>
      (function() {
        var storageKey = 'nearby-traveler-theme';
        var saved = localStorage.getItem(storageKey);
        var theme = (saved === 'dark' || saved === 'light' || saved === 'system') ? saved : 'dark';
        var resolved = theme === 'system'
          ? (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
          : theme;
        document.documentElement.classList.add(resolved);
      })();
    </script>
    <meta name="viewport" content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content" />
    <title>Nearby Traveler — Meet Travelers & Locals in Real Time | Free Social Travel App</title>
    
    <!-- Standard Cache Control -->
    <meta http-equiv="Cache-Control" content="no-cache" />
    <meta name="app-version" content="v1.0.0" />
    
    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#3b82f6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Nearby Traveler" />
    
    <!-- App Icons -->
    <link rel="icon" type="image/png" sizes="16x16" href="/icon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-touch-icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/apple-touch-icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon-180x180.png" />
    
    <!-- Mobile optimization -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Nearby Traveler is the social travel app that connects you with locals and travelers in real time. See who is free right now, meet up instantly, and never explore alone. Free to join." />
    <meta name="keywords" content="travel app, meet travelers, meet locals, solo travel, travel companions, social travel, available now, travel networking, backpacking, hostel, real time meetup" />
    <meta name="author" content="Nearby Traveler" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://nearbytraveler.org/" />

    <!-- Open Graph Tags -->
    <meta property="og:title" content="Nearby Traveler — Meet Travelers & Locals in Real Time" />
    <meta property="og:description" content="See who is free right now in any city. Mark yourself available, match with locals and travelers nearby, and meet up instantly. Free to join." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://nearbytraveler.org/" />
    <meta property="og:site_name" content="Nearby Traveler" />
    <meta property="og:image" content="https://nearbytraveler.org/og-image.png" />
    <meta property="og:image:width" content="2848" />
    <meta property="og:image:height" content="1504" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Nearby Traveler — Meet Travelers & Locals in Real Time" />
    <meta name="twitter:description" content="See who is free right now in any city. Mark yourself available and meet up instantly. Free." />
    <meta name="twitter:image" content="https://nearbytraveler.org/og-image.png" />
    <meta name="twitter:site" content="@nearbytraveler" />
    
    <!-- OneSignal Web Push SDK — SDK loaded here, init is deferred to the React
         component (OneSignalInit.tsx) which only runs after authentication so
         the permission prompt never appears for logged-out visitors. -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <!-- EMERGENCY FIX: Capture reset token before React app loads -->
    <script>
      (function() {
        if (window.location.pathname === '/reset-password' && window.location.search) {
          const params = new URLSearchParams(window.location.search);
          const token = params.get('token');
          if (token) {
            console.log('🔐 EMERGENCY: Storing reset token before React loads:', token);
            localStorage.setItem('reset_token', token);
          }
        }
      })();
    </script>

    <!-- JSON-LD Structured Data -->

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Nearby Traveler?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nearby Traveler is a free social travel app that connects travelers and locals in real time. Open the app in any city and instantly see who is free right now — locals who want to show you around and travelers who just arrived like you."
          }
        },
        {
          "@type": "Question",
          "name": "How does Nearby Traveler work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Set your city, mark yourself as a traveler or local, and see who is Available Now on the home screen. Join someone in one tap — either auto-join into a chat or wait for approval. Then make plans."
          }
        },
        {
          "@type": "Question",
          "name": "Is Nearby Traveler free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, Nearby Traveler is completely free to use. Sign up at nearbytraveler.org and start connecting with travelers and locals in your city today."
          }
        },
        {
          "@type": "Question",
          "name": "How is Nearby Traveler different from Meetup or dating apps?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nearby Traveler is not a dating app and not a generic events app. It is specifically built for travelers and locals to meet in real time — showing you who is free right now in your city, not just scheduled events weeks away."
          }
        },
        {
          "@type": "Question",
          "name": "Can I use Nearby Traveler in my own city?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. You can use Nearby Traveler as a local to meet travelers visiting your city, or as a traveler arriving somewhere new. Every user is both a local at home and a traveler when they go somewhere new."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root">
      <div id="boot">
        <div>
          <div class="title">Nearby Traveler</div>
          <div class="sub">Loading…</div>
        </div>
      </div>
    </div>
    <script>
      // Hide boot screen immediately on public/auth routes to prevent flash.
      // For logged-out users these pages render directly — no auth check needed.
      (function() {
        var p = window.location.pathname;
        var isPublic = p === '/' || p === '/auth' || p === '/signin' || p === '/join'
          || p.indexOf('/signup') === 0 || p.indexOf('/landing') === 0 || p === '/about'
          || p === '/privacy' || p === '/terms';
        if (isPublic) {
          var b = document.getElementById('boot');
          if (b) b.style.display = 'none';
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
