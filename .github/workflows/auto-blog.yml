name: Auto-blog (generate post & auto-merge)

on:
  # Runs at 13:00 UTC (6am Pacific) on the 1st, 11th, and 21st of each month.
  # Gives you 3 posts/month, never closer than 10 days apart.
  schedule:
    - cron: "0 13 1,11,21 * *"
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write       # to push the new branch
  pull-requests: write  # to open and merge the PR via gh CLI

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Need full history so we can push a new branch
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Run generator
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # used by gh CLI for `gh pr create`
        run: npx tsx scripts/auto-blog/generate.ts

      - name: Auto-merge the generated PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # The generator opens a PR with head ref `auto-blog/<slug>`. Find the
        # newest open one (this run just created it) and squash-merge it
        # immediately so the post publishes without manual approval. The
        # notify-search workflow then fires on the resulting push to main.
        run: |
          PR_NUMBER=$(gh pr list --state open --json number,headRefName --limit 50 \
            --jq '[.[] | select(.headRefName | startswith("auto-blog/"))] | sort_by(.number) | last | .number')
          if [ -z "$PR_NUMBER" ] || [ "$PR_NUMBER" = "null" ]; then
            echo "::error::No auto-blog/* PR found to merge"
            exit 1
          fi
          echo "Merging PR #$PR_NUMBER"
          gh pr merge "$PR_NUMBER" --squash --delete-branch
